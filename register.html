<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* ===============================
   REGISTER – GREEN WOW
=============================== */

body {
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0f2e1d, #050805);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  color: #eaffea;
}

/* Box */
.login-box {
  background: linear-gradient(145deg, #0b1a12, #050805);
  padding: 35px;
  width: 320px;
  border-radius: 22px;
  border: 2px solid #00cc55;
  box-shadow:
    0 0 30px rgba(0,255,102,0.7),
    inset 0 0 18px rgba(0,255,102,0.25);
  text-align: center;
  transition: 0.3s;
}

.login-box:hover {
  transform: scale(1.03);
  box-shadow:
    0 0 50px rgba(0,255,102,1),
    inset 0 0 22px rgba(0,255,102,0.35);
}

/* Title */
.login-box h2 {
  margin-bottom: 25px;
  color: #00ff66;
  font-size: 28px;
  text-shadow: 0 0 15px #00ff66;
}

/* Inputs */
.login-box input {
  width: 100%;
  padding: 12px 14px;
  margin-bottom: 18px;
  border-radius: 14px;
  border: 2px solid #00cc55;
  background: #060a08;
  color: #eaffea;
  font-size: 14px;
  outline: none;
  box-shadow: inset 0 0 10px rgba(0,255,102,0.2);
}

.login-box input::placeholder {
  color: #88ffbb;
}

/* Focus */
.login-box input:focus {
  border-color: #00ff66;
  box-shadow:
    0 0 15px rgba(0,255,102,0.8),
    inset 0 0 12px rgba(0,255,102,0.3);
}

/* Button */
.login-box button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(90deg, #00cc44, #00ff66);
  color: #000;
  font-size: 15px;
  font-weight: bold;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 25px rgba(0,255,102,0.9);
}

.login-box button:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 0 45px rgba(0,255,102,1);
}
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Register</h2>

    <input type="text" id="name" placeholder="Nom">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="register()">Créer compte</button>
  </div>

  <script>
    function register() {
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      let users = JSON.parse(localStorage.getItem("users")) || [];

      if (users.find((u) => u.email === email)) {
        alert("Email déjà utilisé ❌");
        return;
      }

      users.push({ name, email, password });
      localStorage.setItem("users", JSON.stringify(users));

      alert("Compte créé ✅");
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
