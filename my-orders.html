<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mes commandes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* =============================
   MES COMMANDES – GREEN WOW
============================= */

body {
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0f2e1d, #050805);
  padding: 25px;
  margin: 0;
  color: #eaffea;
}

/* Title */
h2 {
  text-align: center;
  margin-bottom: 30px;
  color: #00ff66;
  font-size: 30px;
  text-shadow: 0 0 12px #00ff66;
}

/* Orders container */
#orders {
  max-width: 900px;
  margin: auto;
}

/* Order card */
.order {
  background: linear-gradient(145deg, #0b1a12, #050805);
  border: 2px solid #00cc55;
  padding: 20px;
  margin-bottom: 22px;
  border-radius: 18px;
  box-shadow:
    0 0 18px rgba(0, 255, 102, 0.5),
    inset 0 0 12px rgba(0, 255, 102, 0.2);
  transition: 0.3s;
}

.order:hover {
  transform: translateY(-4px);
  box-shadow:
    0 0 30px rgba(0, 255, 102, 0.9),
    inset 0 0 15px rgba(0, 255, 102, 0.3);
}

/* Text */
.order strong {
  color: #00ff66;
}

.order br {
  line-height: 2;
}

/* Product list */
.order ul {
  margin-top: 12px;
  padding-left: 0;
  list-style: none;
}

.order li {
  background: #111;
  margin-bottom: 10px;
  padding: 10px 14px;
  border-radius: 12px;
  border-left: 5px solid #00ff66;
  box-shadow: 0 0 10px rgba(0, 255, 102, 0.4);
}

/* Button */
.order button {
  margin-top: 15px;
  padding: 10px 18px;
  background: linear-gradient(90deg, #00cc44, #00ff66);
  color: #000;
  font-size: 14px;
  font-weight: bold;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(0, 255, 102, 0.7);
}

.order button:hover {
  transform: translateY(-2px) scale(1.05);
  box-shadow: 0 0 30px rgba(0, 255, 102, 1);
}

/* Empty message */
#orders p {
  text-align: center;
  font-size: 18px;
  opacity: 0.9;
}
  </style>
</head>
<body>

<h2>🧾 Mes commandes</h2>

<div id="orders"></div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
/* =====================
   CHECK LOGIN
===================== */
const currentUser = JSON.parse(localStorage.getItem("currentUser"));

if (!currentUser) {
  alert("لازم تعمل login ❌");
  window.location.href = "login.html";
}

/* =====================
   LOAD ORDERS
===================== */
const orders = JSON.parse(localStorage.getItem("orders")) || [];

const myOrders = orders.filter(
  o => o.email === currentUser.email
);

const ordersDiv = document.getElementById("orders");

/* =====================
   DISPLAY ORDERS
===================== */
if (myOrders.length === 0) {
  ordersDiv.innerHTML = "<p>ما عندك حتى commande 📭</p>";
}

myOrders.forEach((order, index) => {
  ordersDiv.innerHTML += `
    <div class="order">
      <strong>Commande #${index + 1}</strong><br><br>

      📅 Date: ${order.date}<br>
      💳 Paiement: ${order.payment}<br>
      📦 Statut: ${order.status}<br>
      💰 Total: <strong>${order.total} TND</strong>

      <ul>
        ${order.items.map(item =>
          `<li>${item.name} × ${item.qty} = ${item.price * item.qty} TND</li>`
        ).join("")}
      </ul>

      <button onclick="generatePDF(${index})">
        📄 Télécharger facture
      </button>
    </div>
  `;
});

/* =====================
   GENERATE PDF
===================== */
function generatePDF(index) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const order = myOrders[index];

  doc.setFontSize(16);
  doc.text("Facture - Boutique", 20, 20);

  doc.setFontSize(12);
  doc.text(`Client: ${currentUser.name}`, 20, 35);
  doc.text(`Email: ${currentUser.email}`, 20, 43);
  doc.text(`Date: ${order.date}`, 20, 51);
  doc.text(`Paiement: ${order.payment}`, 20, 59);
  doc.text(`Statut: ${order.status}`, 20, 67);

  doc.text("Produits:", 20, 80);

  let y = 90;
  order.items.forEach(item => {
    doc.text(
      `- ${item.name} × ${item.qty} = ${item.price * item.qty} TND`,
      25,
      y
    );
    y += 8;
  });

  doc.setFontSize(14);
  doc.text(`Total: ${order.total} TND`, 20, y + 10);

  doc.save(`facture_commande_${index + 1}.pdf`);
}
</script>

</body>
</html>
