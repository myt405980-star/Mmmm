<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Commandes Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===============================
   ADMIN ORDERS – GREEN WOW
=============================== */

body {
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0f2e1d, #050805);
  padding: 25px;
  margin: 0;
  color: #eaffea;
}

/* Title */
h2 {
  text-align: center;
  margin-bottom: 30px;
  font-size: 32px;
  color: #00ff66;
  text-shadow: 0 0 15px #00ff66;
}

/* Print all button */
.printAllBtn {
  display: block;
  margin: 0 auto 30px auto;
  padding: 14px 22px;
  background: linear-gradient(90deg, #00cc44, #00ff66);
  color: #000;
  font-weight: bold;
  border: none;
  border-radius: 18px;
  cursor: pointer;
  box-shadow: 0 0 25px rgba(0,255,102,0.9);
  transition: 0.3s;
}

.printAllBtn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 45px rgba(0,255,102,1);
}

/* Orders container */
#orders {
  max-width: 1000px;
  margin: auto;
}

/* Order card */
.order {
  background: linear-gradient(145deg, #0b1a12, #050805);
  border: 2px solid #00cc55;
  padding: 22px;
  margin-bottom: 25px;
  border-radius: 22px;
  box-shadow:
    0 0 25px rgba(0,255,102,0.6),
    inset 0 0 15px rgba(0,255,102,0.25);
  transition: 0.3s;
}

.order:hover {
  transform: translateY(-6px);
  box-shadow:
    0 0 40px rgba(0,255,102,1),
    inset 0 0 18px rgba(0,255,102,0.35);
}

/* Text highlight */
.order strong {
  color: #00ff66;
}

/* List */
.order ul {
  list-style: none;
  padding-left: 0;
  margin-top: 15px;
}

.order li {
  background: #0f0f0f;
  margin-bottom: 10px;
  padding: 10px 14px;
  border-radius: 14px;
  border-left: 5px solid #00ff66;
  box-shadow: 0 0 12px rgba(0,255,102,0.5);
}

/* Buttons */
.order button {
  margin-top: 15px;
  padding: 10px 18px;
  background: linear-gradient(90deg, #00cc44, #00ff66);
  color: #000;
  font-weight: bold;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  box-shadow: 0 0 18px rgba(0,255,102,0.8);
  transition: 0.3s;
}

.order button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 35px rgba(0,255,102,1);
}

/* Print single */
button.printBtn {
  background: linear-gradient(90deg, #00aaff, #00ffee);
  box-shadow: 0 0 18px rgba(0,200,255,0.8);
}

button.printBtn:hover {
  box-shadow: 0 0 35px rgba(0,200,255,1);
}

/* Status visual */
.order strong:last-of-type {
  padding: 4px 10px;
  border-radius: 12px;
  background: rgba(0,255,102,0.15);
}
</style>
</head>

<body>

<h2>📦 Commandes Admin</h2>

<button class="printAllBtn" onclick="printAllOrders()">🖨️ Imprimer toutes les commandes</button>
<div id="orders"></div>

<script>
// 🔒 Vérifier si c'est l'admin
const currentUser = JSON.parse(localStorage.getItem("currentUser"));
if (!currentUser || currentUser.email !== "admin@boutique.com") {
  alert("Accès refusé ❌");
  window.location.href = "index.html";
}

// 🔹 Récupérer ou créer des commandes de démonstration
let orders = JSON.parse(localStorage.getItem("orders")) || [];

if (orders.length === 0) {
  const demoOrders = [
    {
      client: "Ali",
      email: "ali@example.com",
      phone: "12345678",
      wilaya: "Tunis",
      delegation: "Centre",
      items: [
        { name: "Produit A", price: 10, qty: 2 },
        { name: "Produit B", price: 20, qty: 1 }
      ],
      total: 40,
      payment: "Cash",
      status: "En attente",
      date: new Date().toLocaleString()
    },
    {
      client: "Sana",
      email: "sana@example.com",
      phone: "98765432",
      wilaya: "Sousse",
      delegation: "Hammam",
      items: [
        { name: "Produit C", price: 15, qty: 3 }
      ],
      total: 45,
      payment: "Card",
      status: "En attente",
      date: new Date().toLocaleString()
    }
  ];

  localStorage.setItem("orders", JSON.stringify(demoOrders));
  orders = demoOrders;
}

// 🔹 Affichage des commandes
const div = document.getElementById("orders");

function renderOrders() {
  if (orders.length === 0) {
    div.innerHTML = "<p>Aucune commande</p>";
    return;
  }

  div.innerHTML = `<p><strong>Total commandes:</strong> ${orders.length}</p>`;

  orders.forEach((o, i) => {
    div.innerHTML += `
      <div class="order" id="order-${i}">
        <strong>Commande #${i + 1}</strong><br>
        👤 Client: ${o.client}<br>
        📧 Email: ${o.email}<br>
        📞 Téléphone: ${o.phone}<br>
        🏙️ Wilaya: ${o.wilaya}<br>
        📍 Delegation: ${o.delegation}<br>
        📅 Date: ${o.date}<br>
        💳 Paiement: ${o.payment}<br>
        📦 Statut: <strong>${o.status || "En attente"}</strong><br>
        💰 Total: ${o.total} TND

        <ul>
          ${o.items.map(p => `<li>${p.name} × ${p.qty} = ${p.price * p.qty} TND</li>`).join("")}
        </ul>

        ${
          o.status !== "Livrée"
            ? `<button onclick="markDelivered(${i})">✅ Marquer livrée</button>`
            : ""
        }

        <button class="printBtn" onclick="printOrder(${i})">🖨️ Imprimer</button>
      </div>
    `;
  });
}

// 🔹 Marquer une commande comme livrée
function markDelivered(index) {
  orders[index].status = "Livrée";
  localStorage.setItem("orders", JSON.stringify(orders));
  renderOrders();
}

// 🔹 Imprimer commande spécifique
function printOrder(index) {
  const orderDiv = document.getElementById(`order-${index}`);
  
  const printContent = `
    <html>
      <head>
        <title>Commande #${index + 1}</title>
        <style>
          body { font-family: Arial, sans-serif; padding: 20px; }
          .order { border:1px solid #000; padding:10px; margin-bottom:10px; }
          ul { margin: 5px 0 0 15px; }
          button { display:none; }
        </style>
      </head>
      <body>
        ${orderDiv.innerHTML}
      </body>
    </html>
  `;

  const printWindow = window.open('', '', 'width=800,height=600');
  printWindow.document.write(printContent);
  printWindow.document.close();
  printWindow.focus();
  printWindow.print();
  printWindow.close();
}

// 🔹 Imprimer toutes les commandes
function printAllOrders() {
  if (orders.length === 0) return alert("Aucune commande à imprimer");

  const printWindow = window.open('', '', 'width=800,height=600');
  const styles = `
    <style>
      body { font-family: Arial, sans-serif; padding: 20px; }
      .order { border:1px solid #000; padding:10px; margin-bottom:10px; }
      ul { margin: 5px 0 0 15px; }
      button { display:none; }
    </style>
  `;
  printWindow.document.write('<html><head><title>Toutes les commandes</title>');
  printWindow.document.write(styles);
  printWindow.document.write('</head><body>');

  orders.forEach((o, i) => {
    printWindow.document.write(`
      <div class="order">
        <strong>Commande #${i + 1}</strong><br>
        👤 Client: ${o.client}<br>
        📧 Email: ${o.email}<br>
        📞 Téléphone: ${o.phone}<br>
        🏙️ Wilaya: ${o.wilaya}<br>
        📍 Delegation: ${o.delegation}<br>
        📅 Date: ${o.date}<br>
        💳 Paiement: ${o.payment}<br>
        📦 Statut: <strong>${o.status || "En attente"}</strong><br>
        💰 Total: ${o.total} TND
        <ul>
          ${o.items.map(p => `<li>${p.name} × ${p.qty} = ${p.price * p.qty} TND</li>`).join("")}
        </ul>
      </div>
    `);
  });

  printWindow.document.write('</body></html>');
  printWindow.document.close();
  printWindow.focus();
  printWindow.print();
  printWindow.close();
}

// 🔹 Afficher commandes au chargement
renderOrders();
</script>

</body>
</html>
