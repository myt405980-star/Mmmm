<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* =============================
   LOGIN – GREEN WOW STYLE
============================= */

body {
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0f2e1d, #050805);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  color: #eaffea;
}

/* Login Box */
.login-box {
  background: linear-gradient(145deg, #0b1a12, #050805);
  padding: 35px 30px;
  width: 320px;
  border-radius: 20px;
  border: 2px solid #00ff66;
  box-shadow:
    0 0 20px rgba(0, 255, 102, 0.6),
    inset 0 0 15px rgba(0, 255, 102, 0.2);
  animation: fadeIn 0.6s ease;
}

/* Title */
.login-box h2 {
  text-align: center;
  margin-bottom: 25px;
  color: #00ff66;
  font-size: 28px;
  text-shadow: 0 0 10px #00ff66;
}

/* Inputs */
.login-box input {
  width: 100%;
  padding: 12px 14px;
  margin-bottom: 18px;
  border-radius: 12px;
  border: 1px solid #00cc55;
  background: #050805;
  color: #eaffea;
  font-size: 15px;
  outline: none;
  transition: 0.3s;
}

.login-box input::placeholder {
  color: #9adfb4;
}

.login-box input:focus {
  border-color: #00ff66;
  box-shadow: 0 0 12px rgba(0, 255, 102, 0.7);
}

/* Button */
.login-box button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(90deg, #00cc44, #00ff66);
  color: #000;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(0, 255, 102, 0.7);
}

.login-box button:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 0 30px rgba(0, 255, 102, 1);
}

/* Animation */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Se connecter</button>
  </div>

  <script>
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  // ADMIN
  if (email === "admin@boutique.com" && password === "123456") {
    localStorage.setItem(
      "currentUser",
      JSON.stringify({
        name: "Admin",
        email: "admin@boutique.com"
      })
    );

    alert("Bienvenue Admin 👑");
    window.location.href = "index.html";
    return;
  }

  // CLIENTS
  const users = JSON.parse(localStorage.getItem("users")) || [];

  const user = users.find(
    (u) => u.email === email && u.password === password
  );

  if (user) {
    localStorage.setItem("currentUser", JSON.stringify(user));
    alert("Bienvenue " + user.name + " 👋");
    window.location.href = "index.html";
  } else {
    alert("Email ou mot de passe incorrect ❌");
  }
}
</script>

</body>
</html>
